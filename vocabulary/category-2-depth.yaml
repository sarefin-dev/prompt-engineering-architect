category: "Depth"
index: 2
description: "Words that control the granularity and rigor of the analysis or output."
terms:
  - word: "Comprehensive"
    effect: "Requests coverage of all edge cases and secondary impacts."
    example: "Provide a comprehensive security review."
  - word: "Exhaustive"
    effect: "Stronger than comprehensive; leaves no path unexamined."
    example: "Conduct an exhaustive search for memory leaks."
  - word: "Granular"
    effect: "Requests low-level, detailed breakdown."
    example: "Provide a granular breakdown of the latency pipeline."
  - word: "Rigorously"
    effect: "Demands high analytical standards and edge-case consideration."
    example: "Rigorously test the failover logic."
  - word: "Brief / Concise"
    effect: "Sets a shallow depth limit to prevent over-explanation."
    example: "Provide a brief summary of the changes."
  - word: "High-level"
    effect: "Requests architectural abstractions, omitting implementation details."
    example: "Provide a high-level view of the new service interactions."
