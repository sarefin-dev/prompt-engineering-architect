category: "Architectural State"
index: 8
description: "Words that describe the state, limits, or configuration of a distributed system or network architecture."
terms:
  - word: "Idempotent"
    effect: "Describes operations that can be repeated safely."
    example: "Ensure the webhook handler is idempotent."
  - word: "Blast Radius"
    effect: "The scale of impact of a failure."
    example: "Design to minimize the blast radius of a region outage."
  - word: "Backpressure"
    effect: "Mechanism to handle overload gracefully without failing."
    example: "Implement backpressure on the ingestion queue."
  - word: "Tail Latency"
    effect: "The latency experienced by the slowest requests (e.g., p99)."
    example: "Optimize the database query for tail latency."
  - word: "Stateless"
    effect: "A service that maintains no memory between requests."
    example: "Deploy the worker tier as stateless instances."
  - word: "Eventual Consistency"
    effect: "Data state where nodes may temporarily disagree."
    example: "Explain how eventual consistency affects the user experience here."
