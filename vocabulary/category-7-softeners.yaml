category: "Softeners"
index: 7
description: "Probability-reducing language that MUST BE AVOIDED. These words introduce optionality and ambiguity where none should exist."
terms:
  - word: "If possible"
    effect: "Allows the model to ignore the instruction. Fix: use 'Must'."
    example: "AVOID: Provide tests if possible."
  - word: "Try to"
    effect: "Reduces the instruction to a suggestion. Fix: use 'Ensure' or 'Mandate'."
    example: "AVOID: Try to optimize for latency."
  - word: "Generally / Usually"
    effect: "Introduces statistical averaging instead of specific rules. Fix: use conditional logic ('If X then Y')."
    example: "AVOID: Generally, use an index here."
  - word: "Appropriate / Suitable / Best"
    effect: "Subjective terms that lack criteria. Fix: state the criteria explicitly."
    example: "AVOID: Choose the most appropriate database."
  - word: "Make sure / Ensure"
    effect: "Weak directives. Fix: use a specific structural test (e.g., 'Verify by...')."
    example: "AVOID: Make sure it is secure."
