category: "Structure"
index: 4
description: "Verbs that define the physical layout of the output."
terms:
  - word: "Enumerate"
    effect: "Produces a numbered, prioritized, or exhaustive list."
    example: "Enumerate the failure modes of this database cluster."
  - word: "Tabulate"
    effect: "Produces a Markdown table format (useful for comparisons)."
    example: "Tabulate the trade-offs between Kafka and RabbitMQ."
  - word: "Demonstrate"
    effect: "Forces the model to provide code or a concrete example."
    example: "Demonstrate the vulnerability with an exploit script."
  - word: "Format"
    effect: "Applies a specific syntax to the output."
    example: "Format the output as a valid JSON array."
  - word: "Sequence"
    effect: "Forces chronological or step-by-step ordering."
    example: "Sequence the deployment steps."
