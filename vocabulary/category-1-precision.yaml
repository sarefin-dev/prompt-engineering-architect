category: "Precision"
index: 1
description: "Words that establish exactness in matching, execution, or reference. Use these to eliminate 'close enough' approximations."
terms:
  - word: "Exactly"
    effect: "Mandates 1-to-1 correspondence with the requirement."
    example: "Match the schema exactly as provided."
  - word: "Explicitly"
    effect: "Forces the model to state what it usually implies."
    example: "Explicitly state the boundary conditions."
  - word: "Strictly"
    effect: "Prevents rule relaxation or graceful degradation."
    example: "Strictly adhere to the formatting constraints."
  - word: "Verbatim"
    effect: "Prevents paraphrasing."
    example: "Output the error message verbatim."
  - word: "Canonical"
    effect: "Requests the standard, accepted community solution rather than a novel invention."
    example: "Use the canonical Go pattern for error handling."
  - word: "Idiomatic"
    effect: "Requests solutions aligned with language/framework conventions."
    example: "Provide an idiomatic React implementation."
