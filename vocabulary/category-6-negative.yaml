category: "Negative Constraint"
index: 6
description: "Words that restrict the model's behavior, preventing over-generation, assumptions, or hallucinations (Chapter 9)."
terms:
  - word: "Prohibit"
    effect: "The strongest negative constraint; absolutely forbids an action."
    example: "Prohibit the use of global variables."
  - word: "Avoid"
    effect: "A strong recommendation against an action."
    example: "Avoid blocking calls in the main thread."
  - word: "Do not / Never"
    effect: "Explicit prohibition."
    example: "Do not invent configuration values."
  - word: "Exclude"
    effect: "Removes specific elements from the output."
    example: "Exclude introductory pleasantries."
  - word: "Omit"
    effect: "Leaves out specific details."
    example: "Omit the standard library imports from the snippet."
