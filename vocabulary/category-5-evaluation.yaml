category: "Evaluation"
index: 5
description: "Verbs used to set criteria and define how success is measured."
terms:
  - word: "Audit"
    effect: "Produces a formal, compliance-oriented or standard-oriented review."
    example: "Audit the Terraform code against AWS CIS benchmarks."
  - word: "Benchmark"
    effect: "Demands comparative analysis against a standard."
    example: "Benchmark the database performance."
  - word: "Validate"
    effect: "Demands confirmation of correctness, not just description."
    example: "Validate the input schema."
  - word: "Verify"
    effect: "Similar to validate, often used for post-execution checks."
    example: "Verify the replication state."
  - word: "Certify"
    effect: "A strong guarantee of compliance, useful in strict compliance prompts."
    example: "Certify that no PII is logged."
