category: "Reasoning Directives"
index: 9
description: "Instructions that force explicit, step-by-step cognitive processes to prevent premature conclusions (Chapter 12 & 34)."
terms:
  - word: "Reason through"
    effect: "Forces explicit decomposition of logic."
    example: "Reason through the failure modes before predicting the outcome."
  - word: "Identify before concluding"
    effect: "Demands explicit problem framing before solution generation."
    example: "Identify the bottleneck before recommending a caching strategy."
  - word: "Do not substitute assumptions"
    effect: "Enforces strict reliance on provided context."
    example: "Do not substitute assumptions for missing configuration details. Specify what is missing."
  - word: "Verify against retrieved data"
    effect: "Requires validation against an external source (like MCP tools)."
    example: "Verify your assessment against retrieved statistics before proceeding."
  - word: "State confirmations and denials"
    effect: "Makes the evidentiary chain explicit across multiple tool calls."
    example: "State what each tool call confirmed or denied before issuing the next."
