category: "Analytical Constraint"
index: 3
description: "Verbs that define the specific cognitive task, moving the model away from summarization and toward critical thinking."
terms:
  - word: "Scrutinize"
    effect: "Activates critical, fault-finding analysis."
    example: "Scrutinize the PR for thread safety issues."
  - word: "Diagnose"
    effect: "Requests root-cause identification from symptoms."
    example: "Diagnose the cause of the GC spikes."
  - word: "Evaluate"
    effect: "Requests assessment against specific criteria."
    example: "Evaluate the architecture for horizontal scalability."
  - word: "Synthesize"
    effect: "Requests combining fragmented information into a cohesive whole."
    example: "Synthesize the log files into a timeline of the incident."
  - word: "Deconstruct"
    effect: "Requests breaking a complex system down into its constituent parts."
    example: "Deconstruct the monolithic payment flow."
  - word: "Reconcile"
    effect: "Requests resolution of conflicting information."
    example: "Reconcile the stated SLO with the observed latency metrics."
